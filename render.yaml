services:
  - type: web
    name: socialties-backend
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build:backend && cd backend && npx prisma db push --accept-data-loss
    startCommand: npm run start:backend
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: ADMIN_EMAIL
        value: admin@socialties.in
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://socialties-frontend.vercel.app,https://socialties-frontend-git-main-socialties.vercel.app,https://socialties-frontend-hk0qsr06x-socialties.vercel.app
        sync: false

  - type: web
    name: socialties-frontend
    runtime: node
    plan: free
    buildCommand: npm ci --include=optional && npm run build:frontend
    startCommand: npm run start:frontend
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NEXT_PUBLIC_API_URL
        value: https://socialties-jxsv.onrender.com
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        value: https://socialties-frontend.vercel.app
